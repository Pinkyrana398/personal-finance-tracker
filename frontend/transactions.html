<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transactions — Finance Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav>
      <span class="nav-brand">💰 Finance Tracker</span>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="transactions.html" class="active">Transactions</a>
      </div>
      <div class="nav-right">
        <span id="nav-username"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="container">
      <!-- Add Transaction Form -->
      <div class="card">
        <h2>Add Transaction</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Type</label>
            <select id="type">
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="category">
              <option>Food</option>
              <option>Transport</option>
              <option>Bills</option>
              <option>Entertainment</option>
              <option>Shopping</option>
              <option>Health</option>
              <option>Education</option>
              <option>Salary</option>
              <option>Freelance</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Amount (₹)</label>
            <input
              type="number"
              id="amount"
              placeholder="0.00"
              min="0"
              step="0.01"
            />
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="date" />
          </div>
          <div class="form-group">
            <label>Note (optional)</label>
            <input type="text" id="note" placeholder="e.g. Lunch at canteen" />
          </div>
          <div class="form-group" style="align-self: flex-end">
            <button class="btn-primary" onclick="addTransaction()">
              + Add
            </button>
          </div>
        </div>
        <div id="form-error" class="error-msg" style="margin-top: 0.5rem"></div>
      </div>

      <!-- Transactions Table -->
      <div class="card" style="margin-top: 1.5rem">
        <h2>Transaction History</h2>
        <div class="table-wrapper">
          <table id="transaction-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Note</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="transaction-body">
              <tr>
                <td colspan="6" style="text-align: center; color: #999">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/transactions.js"></script>
  </body>
</html>
