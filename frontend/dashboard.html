<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Finance Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <nav>
      <span class="nav-brand">💰 Finance Tracker</span>
      <div class="nav-links">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="transactions.html">Transactions</a>
      </div>
      <div class="nav-right">
        <span id="nav-username"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="container">
      <h2 class="page-title">📊 Your Dashboard</h2>

      <!-- Summary Cards -->
      <div class="summary-grid">
        <div class="card summary-card income-card">
          <div class="card-icon">💚</div>
          <h3>Total Income</h3>
          <p id="total-income">Loading...</p>
        </div>
        <div class="card summary-card expense-card">
          <div class="card-icon">🔴</div>
          <h3>Total Expense</h3>
          <p id="total-expense">Loading...</p>
        </div>
        <div class="card summary-card balance-card">
          <div class="card-icon">💰</div>
          <h3>Current Balance</h3>
          <p id="balance">Loading...</p>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="card chart-box">
          <h3>Spending by Category</h3>
          <canvas id="pieChart"></canvas>
        </div>
        <div class="card chart-box">
          <h3>Monthly Expenses (Last 6 Months)</h3>
          <canvas id="barChart"></canvas>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
    <script src="js/charts.js"></script>
  </body>
</html>
